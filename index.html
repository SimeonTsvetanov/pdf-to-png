<!doctype html>
<html lang="en">
  <head>

    <!-- Primary meta -->

    <meta name="color-scheme" content="light dark" />
    <link rel="canonical" href="https://simeontsvetanov.github.io/pdf-to-png/" />

    <!-- Icons (relative paths resolve under the GitHub Pages base path) -->

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PDF to PNG Converter — Free & Private" />

      property="og:description"
      content="Convert PDF pages to PNG images right in your browser. Each page becomes its own PNG. Free, offline-capable, no signup."
    />
    <meta property="og:url" content="https://simeontsvetanov.github.io/pdf-to-png/" />

    <!-- Twitter -->

      name="twitter:description"
      content="Convert PDF pages to PNG images right in your browser. Free, offline-capable, no signup."
    />
    <meta name="twitter:image" content="https://simeontsvetanov.github.io/pdf-to-png/og-image.png" />

        "@context": "https://schema.org",

        "name": "PDF to PNG",
        "url": "https://simeontsvetanov.github.io/pdf-to-png/",

        "operatingSystem": "Any",
        "browserRequirements": "Requires a modern browser with JavaScript.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "Simeon Tsvetanov", "email": "tsvetanov.simeon@gmail.com" }
