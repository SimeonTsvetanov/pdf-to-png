<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PDF to PNG">
  <defs>
    <linearGradient id="brandM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.55" stop-color="#6d3df0"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="sheenM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background for maskable safe zone -->
  <rect x="0" y="0" width="512" height="512" fill="url(#brandM)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#sheenM)"/>

  <!-- Content scaled to ~70% and centered, inside the maskable safe zone -->
  <g transform="translate(256 256) scale(0.7) translate(-256 -256)">
    <g font-family="'Space Grotesk', 'Space Grotesk Variable', 'DejaVu Sans', sans-serif" font-weight="700" text-anchor="middle">
      <text x="256" y="205" font-size="134" fill="#ffffff" letter-spacing="2">PDF</text>
      <text x="256" y="448" font-size="134" fill="#ffffff" letter-spacing="2">PNG</text>
    </g>
    <g transform="translate(256 252)">
      <path d="M-32 -24 L0 0 L32 -24" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
      <path d="M-32 4 L0 28 L32 4" fill="none" stroke="#a5f3fc" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
    </g>
  </g>
</svg>
